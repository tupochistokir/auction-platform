services:
  - type: web
    name: auction-platform-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: auction-platform-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: AUCTION_AUTH_SECRET
        sync: false
